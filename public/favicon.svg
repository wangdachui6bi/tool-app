<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  <!-- 2x2 Grid of tool symbols -->
  <!-- Top-left: Clock/Timer -->
  <circle cx="176" cy="176" r="52" fill="none" stroke="white" stroke-width="12" opacity="0.95"/>
  <line x1="176" y1="176" x2="176" y2="148" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
  <line x1="176" y1="176" x2="196" y2="176" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
  <!-- Top-right: Checkmark -->
  <rect x="288" y="132" width="88" height="88" rx="18" fill="none" stroke="white" stroke-width="12" opacity="0.95"/>
  <polyline points="308,178 326,196 360,158" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- Bottom-left: Heart/Calendar -->
  <rect x="132" y="290" width="88" height="88" rx="18" fill="none" stroke="white" stroke-width="12" opacity="0.95"/>
  <path d="M176,320 C164,306 142,312 142,328 C142,344 176,362 176,362 C176,362 210,344 210,328 C210,312 188,306 176,320Z" fill="white" opacity="0.95"/>
  <!-- Bottom-right: Calculator/Grid -->
  <g opacity="0.95">
    <rect x="296" y="298" width="22" height="22" rx="5" fill="white"/>
    <rect x="330" y="298" width="22" height="22" rx="5" fill="white"/>
    <rect x="296" y="332" width="22" height="22" rx="5" fill="white"/>
    <rect x="330" y="332" width="22" height="22" rx="5" fill="white"/>
    <rect x="364" y="298" width="0" height="22" rx="5" fill="white"/>
    <rect x="288" y="282" width="96" height="80" rx="16" fill="none" stroke="white" stroke-width="12"/>
  </g>
</svg>
